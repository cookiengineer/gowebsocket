<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="index.css">
	<script type="module" src="index.mjs" defer></script>
	<title>WebSocket Chat Server</title>
</head>
<body>
	<header>
		<div>
			<label for="name">Name</label>
			<input name="user" type="text" id="name" maxlength="16" autocomplete="off" pattern="^[a-z]{3,}(-[a-z]+)?$" required>
			<label for="room">Room</label>
			<select name="room" id="room">
				<option value="#welcome">#welcome</option>
				<option value="#golang">#golang</option>
				<option value="#gooey">#gooey</option>
				<option value="#trekkies">#trekkies</option>
				<option value="#wookies">#wookies</option>
			</select>
		</div>
		<span id="status">connecting ...</span>
	</header>
	<main><!-- Chat Room Messages --></main>
	<footer>
		<input type="text" name="message" placeholder="Type a message..." maxlength="1024" autocomplete="off">
		<button id="send" disabled>Send Message</button>
	</footer>
</body>
</html>
